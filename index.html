<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>都道府県シルエットクイズ</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: #26384d;
      background:
        radial-gradient(circle at 10% 10%, #fff1a8 0 70px, transparent 72px),
        radial-gradient(circle at 92% 15%, #ffb3d9 0 64px, transparent 66px),
        radial-gradient(circle at 12% 88%, #b7f7c5 0 76px, transparent 78px),
        radial-gradient(circle at 88% 86%, #9ee7ff 0 92px, transparent 94px),
        linear-gradient(135deg, #e9f8ff 0%, #fff9dd 50%, #fff1f8 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 207, 74, .45) 0 5px, transparent 6px),
        radial-gradient(circle, rgba(123, 223, 242, .38) 0 5px, transparent 6px);
      background-size: 72px 72px, 96px 96px;
      background-position: 0 0, 34px 38px;
      opacity: .55;
      z-index: -1;
    }

    .app {
      max-width: 1040px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 14px;
      position: relative;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      background: #ffffff;
      border: 3px solid #26384d;
      border-radius: 999px;
      font-weight: 900;
      font-size: 14px;
      box-shadow: 0 5px 0 #26384d;
      margin-bottom: 12px;
    }

    h1 {
      margin: 8px 0 8px;
      font-size: clamp(30px, 7vw, 52px);
      letter-spacing: 0.04em;
      color: #1f5f99;
      text-shadow:
        3px 3px 0 #ffffff,
        5px 5px 0 #ffcf4a;
      line-height: 1.2;
    }

    .lead {
      display: inline-block;
      margin: 0;
      padding: 10px 16px;
      background: rgba(255,255,255,.78);
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.7;
      color: #52606d;
      font-weight: 700;
    }

    .panel {
      background: rgba(255, 255, 255, 0.95);
      border: 4px solid #26384d;
      border-radius: 34px;
      box-shadow: 0 10px 0 #26384d;
      padding: 18px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "★";
      position: absolute;
      top: 12px;
      left: 18px;
      font-size: 34px;
      color: #ffcf4a;
      transform: rotate(-15deg);
    }

    .panel::after {
      content: "●";
      position: absolute;
      top: 18px;
      right: 24px;
      font-size: 28px;
      color: #7bdff2;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 8px auto 16px;
      max-width: 760px;
    }

    .status-card {
      background: linear-gradient(180deg, #ffffff 0%, #f0fbff 100%);
      border: 3px solid #26384d;
      border-radius: 22px;
      padding: 10px;
      text-align: center;
      font-weight: 900;
      box-shadow: 0 5px 0 #26384d;
    }

    .status-card span {
      display: block;
      font-size: 12px;
      color: #6d7a88;
      margin-bottom: 4px;
    }

    .status-card strong {
      font-size: 24px;
      color: #1f5f99;
    }

    .mode-title {
      text-align: center;
      font-weight: 900;
      color: #26384d;
      margin: 14px 0 9px;
      font-size: 17px;
    }

    .mode-title::before,
    .mode-title::after {
      content: " ✦ ";
      color: #ff8ec7;
    }

    .mode-box {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
    }

    .mode-btn,
    .control-btn,
    .answer-btn,
    .shape-choice {
      transition: transform 0.05s, box-shadow 0.05s, background 0.15s;
    }

    .mode-btn,
    .control-btn {
      padding: 12px 17px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 15px;
      border: 3px solid #26384d;
      box-shadow: 0 5px 0 #26384d;
      background: #ffffff;
      color: #26384d;
    }

    .mode-btn.active {
      background: #7bdff2;
    }

    .mode-btn.study-active {
      background: #b7f7c5;
    }

    .control-btn {
      background: #ffef9f;
    }

    .answer-show-btn {
      background: #ff9fcb;
      font-size: 20px;
      padding: 14px 26px;
    }

    .mode-btn:active,
    .control-btn:active,
    .answer-btn:active,
    .shape-choice:active {
      transform: translateY(5px);
      box-shadow: none;
    }

    .question-area {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .question-card {
      max-width: 820px;
      margin: 16px auto;
      padding: 12px 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fff9df 100%);
      border: 3px solid #26384d;
      border-radius: 28px;
      box-shadow: 0 6px 0 #26384d;
    }

    .question-title {
      font-size: clamp(23px, 5vw, 36px);
      margin: 6px 0;
      color: #26384d;
      line-height: 1.45;
      font-weight: 900;
    }

    .shape-wrap {
      width: 100%;
      max-width: 430px;
      height: 320px;
      margin: 0 auto 16px;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,207,74,.28) 0 22px, transparent 24px),
        radial-gradient(circle at 85% 80%, rgba(255,159,203,.25) 0 28px, transparent 30px),
        #f8fdff;
      border: 4px dashed #77c6e8;
      border-radius: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 8px rgba(255,255,255,.85);
    }

    .shape-wrap.loading::after {
      content: "地図データを読み込み中...";
      position: absolute;
      font-weight: 900;
      color: #62748a;
      background: rgba(255,255,255,.9);
      padding: 10px 16px;
      border-radius: 999px;
      border: 2px solid #a7c7e7;
    }

    svg.pref-svg {
      width: 92%;
      height: 92%;
      display: block;
    }

    .pref-shape {
      fill: #62c370;
      stroke: #23633a;
      stroke-width: 2.8;
      stroke-linejoin: round;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
      max-width: 680px;
      margin: 14px auto;
    }

    .answer-btn {
      min-height: 68px;
      padding: 12px;
      border-radius: 24px;
      border: 3px solid #26384d;
      box-shadow: 0 6px 0 #26384d;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      font-size: clamp(18px, 4.5vw, 27px);
      font-weight: 900;
      color: #26384d;
    }

    .answer-btn:hover {
      background: #fff5bf;
    }

    .answer-btn.correct {
      background: #b7f7c5;
    }

    .answer-btn.wrong {
      background: #ffd1d1;
    }

    .shape-answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
      max-width: 780px;
      margin: 14px auto;
    }

    .shape-choice {
      height: 185px;
      padding: 10px;
      border-radius: 26px;
      border: 3px solid #26384d;
      box-shadow: 0 6px 0 #26384d;
      background: linear-gradient(180deg, #ffffff 0%, #f4fbff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shape-choice:hover {
      background: #fff5bf;
    }

    .shape-choice.correct {
      background: #b7f7c5;
    }

    .shape-choice.wrong {
      background: #ffd1d1;
    }

    .shape-choice svg {
      width: 96%;
      height: 96%;
    }

    .hint {
      min-height: 36px;
      margin: 8px 0 12px;
      font-size: 19px;
      font-weight: 900;
      color: #e27802;
    }

    .hint:not(:empty) {
      display: inline-block;
      padding: 8px 16px;
      background: #fff4c4;
      border: 3px solid #e8a500;
      border-radius: 999px;
      box-shadow: 0 4px 0 #b87900;
    }

    .message {
      min-height: 44px;
      margin: 12px 0 8px;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.5;
    }

    .message.ok {
      color: #148a3b;
    }

    .message.ng {
      color: #d43d3d;
    }

    .reveal-box {
      display: none;
      max-width: 640px;
      margin: 18px auto;
      padding: 20px;
      border: 4px solid #26384d;
      border-radius: 32px;
      background:
        radial-gradient(circle at 14% 20%, rgba(255,255,255,.9) 0 28px, transparent 30px),
        linear-gradient(180deg, #fff6c7 0%, #ffe8f4 100%);
      box-shadow: 0 8px 0 #26384d;
    }

    .reveal-label {
      font-size: 18px;
      font-weight: 900;
      color: #7a5600;
      margin-bottom: 6px;
    }

    .reveal-answer {
      font-size: clamp(38px, 9vw, 66px);
      font-weight: 900;
      color: #1f5f99;
      line-height: 1.2;
      text-shadow:
        2px 2px 0 #ffffff,
        4px 4px 0 #ffcf4a;
    }

    .reveal-region {
      display: inline-block;
      margin-top: 10px;
      padding: 7px 14px;
      font-size: 20px;
      font-weight: 900;
      color: #e27802;
      background: #ffffff;
      border: 3px solid #e8a500;
      border-radius: 999px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .small-note {
      margin: 16px auto 0;
      max-width: 780px;
      font-size: 13px;
      line-height: 1.7;
      color: #6d7a88;
      text-align: left;
      background: rgba(247,251,255,.9);
      border: 2px solid #d5e5f4;
      border-radius: 18px;
      padding: 11px 13px;
    }

    .error-box {
      padding: 16px;
      border-radius: 20px;
      background: #fff1f1;
      border: 3px solid #e86b6b;
      color: #8c1f1f;
      font-weight: 800;
      line-height: 1.7;
      display: none;
    }

    .confetti {
      position: fixed;
      width: 12px;
      height: 12px;
      top: -20px;
      z-index: 9999;
      pointer-events: none;
      border-radius: 3px;
      animation: fall 1.2s linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .pop {
      animation: pop 0.35s ease;
    }

    @keyframes pop {
      0% {
        transform: scale(0.9);
      }
      60% {
        transform: scale(1.08);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
      }

      .panel {
        padding: 14px;
        border-radius: 26px;
      }

      .panel::before,
      .panel::after {
        display: none;
      }

      .topbar {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 7px;
      }

      .status-card {
        padding: 8px 4px;
        border-radius: 18px;
      }

      .status-card strong {
        font-size: 18px;
      }

      .shape-wrap {
        height: 260px;
      }

      .answers,
      .shape-answers {
        grid-template-columns: 1fr 1fr;
        gap: 9px;
      }

      .answer-btn {
        min-height: 58px;
        font-size: 18px;
        border-radius: 18px;
      }

      .shape-choice {
        height: 150px;
      }

      .mode-btn,
      .control-btn {
        font-size: 14px;
        padding: 10px 13px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <div class="badge">🌈 小学生 社会アプリ</div>
      <h1>都道府県<br>シルエットクイズ</h1>
      <p class="lead">
        形を見て答える、県名を見て形を選ぶ。<br>
        個人でも、みんなでも楽しく学べます。
      </p>
    </header>

    <section class="panel">
      <div class="topbar" id="scoreArea">
        <div class="status-card">
          <span>問題</span>
          <strong id="qCount">0</strong>
        </div>
        <div class="status-card">
          <span>正解</span>
          <strong id="correctCount">0</strong>
        </div>
        <div class="status-card">
          <span>正答率</span>
          <strong id="rate">0%</strong>
        </div>
      </div>

      <div class="mode-title">学習スタイル</div>
      <div class="mode-box">
        <button class="mode-btn study-active" id="studyChoiceBtn">ひとりで4択</button>
        <button class="mode-btn" id="studyRevealBtn">みんなで考える</button>
      </div>

      <div class="mode-title">問題タイプ</div>
      <div class="mode-box">
        <button class="mode-btn active" id="modeShapeToName">形 → 県名</button>
        <button class="mode-btn" id="modeNameToShape">県名 → 形</button>
        <button class="mode-btn" id="modeMix">ミックス</button>
      </div>

      <div id="errorBox" class="error-box"></div>

      <div class="question-area">
        <div class="question-card">
          <h2 class="question-title" id="questionTitle">地図データを読み込んでいます</h2>
        </div>

        <div id="mainShapeWrap" class="shape-wrap loading">
          <div id="mainShape"></div>
        </div>

        <div class="hint" id="hintText"></div>

        <div id="textAnswers" class="answers"></div>
        <div id="shapeAnswers" class="shape-answers"></div>

        <div id="revealBox" class="reveal-box">
          <div class="reveal-label">正解は...</div>
          <div id="revealAnswer" class="reveal-answer"></div>
          <div id="revealRegion" class="reveal-region"></div>
        </div>

        <div id="message" class="message"></div>

        <div class="controls">
          <button class="control-btn" id="hintBtn">ヒントを見る</button>
          <button class="control-btn answer-show-btn" id="showAnswerBtn">正解を見る</button>
          <button class="control-btn" id="nextBtn">次の問題へ</button>
          <button class="control-btn" id="resetBtn">最初から</button>
        </div>

        <p class="small-note">
          ※「ひとりで4択」は、個人練習用です。<br>
          ※「みんなで考える」は、授業や集団学習で画面を見ながら考えたあとに、正解ボタンで答えを表示するモードです。<br>
          ※都道府県の形は外部の地図データを読み込んで表示します。GitHub Pagesで使う場合はインターネット接続が必要です。
        </p>
      </div>
    </section>
  </main>

  <script>
    const PREFS = [
      { code: "01", name: "北海道", region: "北海道地方" },

      { code: "21", name: "岐阜県", region: "中部地方" },
      { code: "22", name: "静岡県", region: "中部地方" },
      { code: "23", name: "愛知県", region: "中部地方" },
      { code: "24", name: "三重県", region: "近畿地方" },

      { code: "32", name: "島根県", region: "中国地方" },
      { code: "33", name: "岡山県", region: "中国地方" },
      { code: "34", name: "広島県", region: "中国地方" },

      { code: "36", name: "徳島県", region: "四国地方" },

      { code: "46", name: "鹿児島県", region: "九州・沖縄地方" },
      { code: "47", name: "沖縄県", region: "九州・沖縄地方" }
    ];

    const GEOJSON_URL = "https://cdn.jsdelivr.net/gh/amay077/JapanPrefGeoJson@master/japan.geojson";

    let geoFeaturesByCode = {};
    let currentPref = null;
    let currentQuestionMode = "shapeToName";
    let answerLocked = false;
    let studyMode = "choice";
    let currentMode = "shapeToName";
    let questionCount = 0;
    let correctCount = 0;

    const qCountEl = document.getElementById("qCount");
    const correctCountEl = document.getElementById("correctCount");
    const rateEl = document.getElementById("rate");
    const scoreAreaEl = document.getElementById("scoreArea");
    const questionTitleEl = document.getElementById("questionTitle");
    const mainShapeWrapEl = document.getElementById("mainShapeWrap");
    const mainShapeEl = document.getElementById("mainShape");
    const textAnswersEl = document.getElementById("textAnswers");
    const shapeAnswersEl = document.getElementById("shapeAnswers");
    const hintTextEl = document.getElementById("hintText");
    const messageEl = document.getElementById("message");
    const errorBox = document.getElementById("errorBox");
    const revealBoxEl = document.getElementById("revealBox");
    const revealAnswerEl = document.getElementById("revealAnswer");
    const revealRegionEl = document.getElementById("revealRegion");

    const hintBtn = document.getElementById("hintBtn");
    const showAnswerBtn = document.getElementById("showAnswerBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const studyChoiceBtn = document.getElementById("studyChoiceBtn");
    const studyRevealBtn = document.getElementById("studyRevealBtn");
    const modeShapeToNameBtn = document.getElementById("modeShapeToName");
    const modeNameToShapeBtn = document.getElementById("modeNameToShape");
    const modeMixBtn = document.getElementById("modeMix");

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function pickRandomPref() {
      return PREFS[Math.floor(Math.random() * PREFS.length)];
    }

    function getWrongPrefs(correctCode, count = 3) {
      return shuffle(PREFS.filter(p => p.code !== correctCode)).slice(0, count);
    }

    function updateScore() {
      qCountEl.textContent = questionCount;
      correctCountEl.textContent = correctCount;
      const rate = questionCount === 0 ? 0 : Math.round((correctCount / questionCount) * 100);
      rateEl.textContent = rate + "%";
    }

    function playSound(type) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const audioCtx = new AudioContext();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === "correct") {
        oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08);
        oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16);
        gain.gain.setValueAtTime(0.16, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.45);
      } else if (type === "wrong") {
        oscillator.frequency.setValueAtTime(180, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(120, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.35);
      } else {
        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.35);
      }
    }

    function createConfetti() {
      const colors = ["#ffcf4a", "#7bdff2", "#b7f7c5", "#ff9fcb", "#cdb4db", "#ffadad"];
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.25 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 1600);
      }
    }

    function normalizeCode(value) {
      if (value === undefined || value === null) return "";
      const str = String(value);
      const match = str.match(/\d+/);
      if (!match) return "";
      return match[0].padStart(2, "0").slice(0, 2);
    }

    function findCodeFromProperties(properties) {
      const keys = ["code", "pref", "prefectureCode", "N03_007", "id", "ID", "PREF", "jiscode"];

      for (const key of keys) {
        if (properties && properties[key] !== undefined) {
          const code = normalizeCode(properties[key]);
          if (code) return code;
        }
      }

      const values = Object.values(properties || {});
      for (const v of values) {
        const code = normalizeCode(v);
        if (PREFS.some(p => p.code === code)) return code;
      }

      return "";
    }

    function lonLatToPoint(lon, lat) {
      const x = lon;
      const sin = Math.sin((lat * Math.PI) / 180);
      const y = 0.5 * Math.log((1 + sin) / (1 - sin)) * 180 / Math.PI;
      return [x, -y];
    }

    function collectRings(geometry) {
      if (!geometry) return [];
      if (geometry.type === "Polygon") return geometry.coordinates;
      if (geometry.type === "MultiPolygon") return geometry.coordinates.flat();
      return [];
    }

    function geometryToSvg(feature, size = 300) {
      if (!feature) {
        return `<svg class="pref-svg" viewBox="0 0 ${size} ${size}" aria-label="都道府県の形"></svg>`;
      }

      const rings = collectRings(feature.geometry);
      const projectedRings = rings.map(ring =>
        ring.map(coord => lonLatToPoint(coord[0], coord[1]))
      );

      const allPoints = projectedRings.flat();

      if (allPoints.length === 0) {
        return `<svg class="pref-svg" viewBox="0 0 ${size} ${size}" aria-label="都道府県の形"></svg>`;
      }

      const minX = Math.min(...allPoints.map(p => p[0]));
      const maxX = Math.max(...allPoints.map(p => p[0]));
      const minY = Math.min(...allPoints.map(p => p[1]));
      const maxY = Math.max(...allPoints.map(p => p[1]));

      const width = maxX - minX || 1;
      const height = maxY - minY || 1;
      const padding = 20;
      const scale = Math.min((size - padding * 2) / width, (size - padding * 2) / height);
      const offsetX = (size - width * scale) / 2;
      const offsetY = (size - height * scale) / 2;

      const paths = projectedRings.map(ring => {
        const d = ring.map((p, index) => {
          const x = (p[0] - minX) * scale + offsetX;
          const y = (p[1] - minY) * scale + offsetY;
          return `${index === 0 ? "M" : "L"}${x.toFixed(2)} ${y.toFixed(2)}`;
        }).join(" ") + " Z";

        return `<path class="pref-shape" d="${d}"></path>`;
      }).join("");

      return `
        <svg class="pref-svg" viewBox="0 0 ${size} ${size}" aria-label="都道府県の形">
          ${paths}
        </svg>
      `;
    }

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = "message " + (type || "");
    }

    function clearQuestionArea() {
      mainShapeEl.innerHTML = "";
      textAnswersEl.innerHTML = "";
      shapeAnswersEl.innerHTML = "";
      hintTextEl.textContent = "";
      revealBoxEl.style.display = "none";
      revealAnswerEl.textContent = "";
      revealRegionEl.textContent = "";
      showMessage("", "");
    }

    function makeTextChoices(correctPref) {
      const choices = shuffle([correctPref, ...getWrongPrefs(correctPref.code, 3)]);

      choices.forEach(pref => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = pref.name;
        btn.onclick = () => checkTextAnswer(btn, pref, correctPref);
        textAnswersEl.appendChild(btn);
      });
    }

    function makeShapeChoices(correctPref) {
      const choices = shuffle([correctPref, ...getWrongPrefs(correctPref.code, 3)]);

      choices.forEach(pref => {
        const btn = document.createElement("button");
        btn.className = "shape-choice";
        btn.setAttribute("aria-label", pref.name);
        btn.innerHTML = geometryToSvg(geoFeaturesByCode[pref.code], 220);
        btn.onclick = () => checkShapeAnswer(btn, pref, correctPref);
        shapeAnswersEl.appendChild(btn);
      });
    }

    function checkTextAnswer(button, selectedPref, correctPref) {
      if (answerLocked) return;
      answerLocked = true;
      questionCount++;

      if (selectedPref.code === correctPref.code) {
        correctCount++;
        button.classList.add("correct");
        showMessage("正解！すごい！よく見つけました！", "ok");
        playSound("correct");
        createConfetti();
      } else {
        button.classList.add("wrong");
        showMessage(`ざんねん。正解は「${correctPref.name}」です。`, "ng");
        playSound("wrong");
        markCorrectText(correctPref);
      }

      updateScore();
    }

    function markCorrectText(correctPref) {
      const buttons = textAnswersEl.querySelectorAll(".answer-btn");
      buttons.forEach(btn => {
        if (btn.textContent === correctPref.name) {
          btn.classList.add("correct");
        }
      });
    }

    function checkShapeAnswer(button, selectedPref, correctPref) {
      if (answerLocked) return;
      answerLocked = true;
      questionCount++;

      if (selectedPref.code === correctPref.code) {
        correctCount++;
        button.classList.add("correct");
        showMessage("正解！形をよく見られています！", "ok");
        playSound("correct");
        createConfetti();
      } else {
        button.classList.add("wrong");
        showMessage(`ざんねん。正解は「${correctPref.name}」の形です。`, "ng");
        playSound("wrong");
        markCorrectShape(correctPref);
      }

      updateScore();
    }

    function markCorrectShape(correctPref) {
      const buttons = shapeAnswersEl.querySelectorAll(".shape-choice");
      buttons.forEach(btn => {
        if (btn.getAttribute("aria-label") === correctPref.name) {
          btn.classList.add("correct");
        }
      });
    }

    function showRevealAnswer() {
      if (!currentPref) return;

      revealBoxEl.style.display = "block";
      revealBoxEl.classList.remove("pop");
      void revealBoxEl.offsetWidth;
      revealBoxEl.classList.add("pop");

      if (currentQuestionMode === "shapeToName") {
        revealAnswerEl.textContent = currentPref.name;
        revealRegionEl.textContent = currentPref.region;
      } else {
        revealAnswerEl.textContent = currentPref.name;
        revealRegionEl.textContent = "この形が正解です";
        mainShapeWrapEl.style.display = "flex";
        mainShapeEl.innerHTML = geometryToSvg(geoFeaturesByCode[currentPref.code], 300);
      }

      playSound("reveal");
      createConfetti();
    }

    function createQuestion() {
      clearQuestionArea();
      answerLocked = false;

      currentPref = pickRandomPref();

      currentQuestionMode = currentMode;
      if (currentMode === "mix") {
        currentQuestionMode = Math.random() < 0.5 ? "shapeToName" : "nameToShape";
      }

      if (studyMode === "choice") {
        scoreAreaEl.style.display = "grid";
        showAnswerBtn.style.display = "none";
      } else {
        scoreAreaEl.style.display = "none";
        showAnswerBtn.style.display = "inline-block";
      }

      if (currentQuestionMode === "shapeToName") {
        mainShapeWrapEl.style.display = "flex";
        mainShapeEl.innerHTML = geometryToSvg(geoFeaturesByCode[currentPref.code], 300);
        questionTitleEl.textContent = "この形はどこの都道府県？";
        hintBtn.style.display = "inline-block";

        if (studyMode === "choice") {
          makeTextChoices(currentPref);
        }
      }

      if (currentQuestionMode === "nameToShape") {
        questionTitleEl.textContent = `「${currentPref.name}」の形はどれ？`;

        if (studyMode === "choice") {
          mainShapeWrapEl.style.display = "none";
          hintBtn.style.display = "none";
          makeShapeChoices(currentPref);
        } else {
          mainShapeWrapEl.style.display = "none";
          hintBtn.style.display = "none";
        }
      }
    }

    function setStudyMode(mode) {
      studyMode = mode;
      studyChoiceBtn.classList.toggle("study-active", mode === "choice");
      studyRevealBtn.classList.toggle("study-active", mode === "reveal");
      createQuestion();
    }

    function setQuestionMode(mode) {
      currentMode = mode;
      modeShapeToNameBtn.classList.toggle("active", mode === "shapeToName");
      modeNameToShapeBtn.classList.toggle("active", mode === "nameToShape");
      modeMixBtn.classList.toggle("active", mode === "mix");
      createQuestion();
    }

    function resetGame() {
      questionCount = 0;
      correctCount = 0;
      updateScore();
      createQuestion();
    }

    async function loadGeoJson() {
      try {
        mainShapeWrapEl.classList.add("loading");

        const response = await fetch(GEOJSON_URL);
        if (!response.ok) {
          throw new Error("地図データを読み込めませんでした。");
        }

        const geojson = await response.json();

        if (!geojson.features || !Array.isArray(geojson.features)) {
          throw new Error("地図データの形式を確認できませんでした。");
        }

        geoFeaturesByCode = {};

        geojson.features.forEach(feature => {
          const code = findCodeFromProperties(feature.properties || {});
          if (code) {
            geoFeaturesByCode[code] = feature;
          }
        });

        const missing = PREFS.filter(p => !geoFeaturesByCode[p.code]);

        if (missing.length > 0) {
          throw new Error(
            "一部の都道府県データを読み込めませんでした: " +
            missing.map(p => p.name).join("、")
          );
        }

        mainShapeWrapEl.classList.remove("loading");
        errorBox.style.display = "none";
        createQuestion();

      } catch (error) {
        mainShapeWrapEl.classList.remove("loading");
        questionTitleEl.textContent = "地図データの読み込みに失敗しました";
        errorBox.style.display = "block";
        errorBox.innerHTML = `
          地図データを読み込めませんでした。<br>
          GitHub Pages にアップしたあと、インターネット接続がある状態で開いてください。<br>
          それでも表示されない場合は、GeoJSONデータを同じフォルダに置く方式へ変更できます。<br><br>
          エラー内容：${error.message}
        `;
      }
    }

    hintBtn.addEventListener("click", () => {
      if (!currentPref) return;
      hintTextEl.textContent = `ヒント：${currentPref.region}`;
    });

    showAnswerBtn.addEventListener("click", showRevealAnswer);
    nextBtn.addEventListener("click", createQuestion);
    resetBtn.addEventListener("click", resetGame);

    studyChoiceBtn.addEventListener("click", () => setStudyMode("choice"));
    studyRevealBtn.addEventListener("click", () => setStudyMode("reveal"));

    modeShapeToNameBtn.addEventListener("click", () => setQuestionMode("shapeToName"));
    modeNameToShapeBtn.addEventListener("click", () => setQuestionMode("nameToShape"));
    modeMixBtn.addEventListener("click", () => setQuestionMode("mix"));

    updateScore();
    loadGeoJson();
  </script>
</body>
</html>
